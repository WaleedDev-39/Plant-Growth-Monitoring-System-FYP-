version: '3.9'

services:
  # MongoDB
  mongo:
    image: mongo:7
    container_name: plant-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - plant-net

  # Python AI Service
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: plant-ai-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - MODEL_PATH=./model/plant_model.h5
    networks:
      - plant-net

  # Node.js Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: plant-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - mongo
      - ai-service
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - plant-net

  # React Frontend (dev mode)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: plant-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend
    networks:
      - plant-net

volumes:
  mongo-data:

networks:
  plant-net:
    driver: bridge
